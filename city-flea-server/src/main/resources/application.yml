server:
  port: 8080

spring:
  profiles:
    active: dev
    include:
      - env
  main:
    allow-circular-references: true
  datasource:
    url: jdbc:mysql://localhost:3306/city_flea?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      # password: 123456
      timeout: 3000ms

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: "/**"
      packages-to-scan: com.github.xiaoymin.boot3
  default-flat-param-object: true

knife4j:
  enable: true
  setting:
    language: zh_cn

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.city.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      city:
        mapper: debug
        service: info
        controller: info

city:
  jwt:
    admin-secret-key: itcast
    admin-ttl: 7200000
    admin-token-name: token
    user-secret-key: itcast
    user-ttl: 7200000
    user-token-name: authentication
    rider-secret-key: itcast-rider
    rider-ttl: 7200000
    rider-token-name: rider-authentication
  delivery:
    mode: express
    rider-enabled: false
  express:
    api-url: https://api.kdniao.com
    ebusiness-id: ${EXPRESS_EBUSINESS_ID:}
    api-key: ${EXPRESS_API_KEY:}
    push-url: ${EXPRESS_PUSH_URL:}
  freight:
    default-weight: 500
    default-first-fee: 8.00
    default-continued-fee: 3.00
